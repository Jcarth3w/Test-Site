<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLL CMS | Attorney Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <div>
          <h1>MLL CMS</h1>
          <p>Attorney Editor</p>
        </div>
      </div>
      <button id="logout-btn" class="btn btn-ghost" type="button">Log out</button>
    </header>

    <main class="content">
      <section class="panel">
        <a class="back-link" href="/admin/attorneys" aria-label="Back to attorneys">&#8592;</a>
        <h2 id="form-title">Add Attorney</h2>
        <div id="page-message" class="message hidden" role="alert"></div>

        <form id="attorney-form" class="grid-form">
          <input type="hidden" id="attorney-id">
          <input type="hidden" id="photo-url">
          <input type="hidden" id="practice-areas-json">
          <input type="hidden" id="education-json">
          <input type="hidden" id="bar-admissions-json">
          <input type="hidden" id="awards-json">
          <input type="hidden" id="affiliations-json">

          <label class="field field-half">
            <span>Name</span>
            <input type="text" id="name" required>
          </label>

          <label class="field field-half">
            <span>Title</span>
            <input type="text" id="title" required>
          </label>

          <label class="field field-half">
            <span>Display Order (CMS only)</span>
            <input type="number" id="display-order" min="0" step="1" value="100" required>
          </label>

          <label class="field field-half">
            <span>Specialty</span>
            <input type="text" id="specialty" required>
          </label>

          <label class="field field-half">
            <span>Email</span>
            <input type="email" id="email" placeholder="name@example.com">
          </label>

          <label class="field field-half">
            <span>Phone</span>
            <input type="tel" id="phone" placeholder="(555) 123-4567">
          </label>

          <label class="field field-half">
            <span>Office Location</span>
            <select id="location" required>
              <option value="">Select office</option>
              <option value="Milwaukee, WI">Milwaukee, WI</option>
              <option value="Portland, ME">Portland, ME</option>
              <option value="Albuqueque, NM">Albuqueque, NM</option>
              <option value="Kansas City, KS">Kansas City, KS</option>
              <option value="San Antonio, TX">San Antonio, TX</option>
              <option value="Ann Arbor, MI">Ann Arbor, MI</option>
              <option value="Chicago, IL">Chicago, IL</option>
              <option value="Jacksonville, FL">Jacksonville, FL</option>
              <option value="San Diego, CA">San Diego, CA</option>
            </select>
          </label>

          <label class="field field-half">
            <span>Photo</span>
            <input type="file" id="photo" accept="image/*">
          </label>

          <div class="field field-half photo-preview-field">
            <span>Current / Selected Photo</span>
            <div class="photo-preview-wrap">
              <img id="photo-preview" class="photo-preview hidden" alt="Attorney preview">
              <p id="photo-preview-empty" class="muted">No image selected yet.</p>
            </div>
          </div>

          <label class="field field-half inline-field">
            <span>Entry Status</span>
            <label class="toggle-row">
              <input type="checkbox" id="attorney-active" checked>
              <span>Active (visible on site)</span>
            </label>
          </label>

          <label class="field field-full">
            <span>Areas of Practice</span>
            <div class="practice-editor">
              <div class="practice-catalog-row">
                <select id="practice-area-from-catalog" aria-label="Add an existing practice area from the directory">
                  <option value="">Add from practice directory…</option>
                </select>
              </div>
              <div class="practice-input-row">
                <input type="text" id="practice-area-input" placeholder="Or type a custom area (e.g., Personal Injury)">
                <button id="add-practice-area" type="button" class="btn btn-ghost">Add</button>
              </div>
              <div id="practice-areas-list" class="practice-areas-list"></div>
            </div>
          </label>

          <label class="field field-full">
            <span>Education</span>
            <div class="education-editor">
              <div class="education-input-row">
                <input type="text" id="education-school" placeholder="School/University">
                <input type="text" id="education-degree" placeholder="Degree (e.g., J.D.)">
                <input type="number" id="education-year" placeholder="Year" min="1900" max="2100">
                <button id="add-education" type="button" class="btn btn-ghost">Add</button>
              </div>
              <div id="education-list" class="education-list"></div>
            </div>
          </label>

          <label class="field field-full">
            <span>Bar Admissions</span>
            <div class="bar-editor">
              <div class="bar-input-row">
                <input type="text" id="bar-state" placeholder="State (e.g., Wisconsin)">
                <input type="number" id="bar-year" placeholder="Year" min="1900" max="2100">
                <button id="add-bar-admission" type="button" class="btn btn-ghost">Add</button>
              </div>
              <div id="bar-admissions-list" class="bar-admissions-list"></div>
            </div>
          </label>

          <label class="field field-full">
            <span>Awards</span>
            <div class="awards-editor">
              <div class="awards-input-row">
                <input type="text" id="award-title" placeholder="Title (e.g., Best Lawyer 2024)">
                <input type="text" id="award-description" placeholder="Description (optional)">
                <button id="add-award" type="button" class="btn btn-ghost">Add</button>
              </div>
              <div id="awards-list" class="awards-list"></div>
            </div>
          </label>

          <label class="field field-full">
            <span>Affiliations</span>
            <div class="affiliations-editor">
              <div class="affiliations-input-row">
                <input type="text" id="affiliation-title" placeholder="Organization or role">
                <input type="text" id="affiliation-description" placeholder="Description (optional)">
                <button id="add-affiliation" type="button" class="btn btn-ghost">Add</button>
              </div>
              <div id="affiliations-list" class="affiliations-list"></div>
            </div>
          </label>

          <label class="field field-full">
            <span>Bio</span>
            <textarea id="bio" rows="6" required></textarea>
          </label>

          <div class="form-actions field-full">
            <button type="submit" class="btn btn-primary">Save</button>
            <a class="btn btn-ghost" href="/admin/attorneys">Cancel</a>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script type="module" src="/js/pages/attorneys/form.js"></script>
</body>
</html>
