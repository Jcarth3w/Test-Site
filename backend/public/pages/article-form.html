<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLL CMS | Article Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <div>
          <h1>MLL CMS</h1>
          <p>Insights & News Editor</p>
        </div>
      </div>
      <button id="logout-btn" class="btn btn-ghost" type="button">Log out</button>
    </header>

    <main class="content">
      <section class="panel">
        <a class="back-link" href="/admin/articles" aria-label="Back to articles">&#8592;</a>
        <h2 id="form-title">Add Entry</h2>
        <p class="muted form-intro">Choose a content type, add one or more authors, then write the listing summary and full body.</p>
        <div id="page-message" class="message hidden" role="alert"></div>

        <form id="article-form" class="grid-form">
          <input type="hidden" id="article-id">
          <input type="hidden" id="image-url">

          <label class="field field-half">
            <span>Category</span>
            <select id="category" required>
              <optgroup label="Insights">
                <option value="article">Article</option>
                <option value="alert">Alert</option>
              </optgroup>
              <optgroup label="News">
                <option value="award">Award</option>
                <option value="new-hire">New Hire</option>
                <option value="speaking">Speaking</option>
                <option value="media">Media Coverage</option>
                <option value="announcement">Announcement</option>
              </optgroup>
            </select>
          </label>

          <label class="field field-half inline-field">
            <span>Status</span>
            <label class="toggle-row">
              <input type="checkbox" id="article-published">
              <span>Published (visible on site)</span>
            </label>
          </label>

          <div class="field field-full category-guidance" id="category-guidance">
            <p class="category-guidance-label" id="category-label">Article</p>
            <p class="muted" id="category-description"></p>
          </div>

          <label class="field field-half">
            <span>Title</span>
            <input type="text" id="title" required>
          </label>

          <label class="field field-half">
            <span>Slug (URL-friendly)</span>
            <input type="text" id="slug" required>
          </label>

          <label class="field field-half">
            <span>Publication Date</span>
            <input type="datetime-local" id="publication-date">
          </label>

          <label class="field field-half">
            <span>Source URL (optional)</span>
            <input type="url" id="source-url" placeholder="https://example.com/original-article">
          </label>

          <div class="field field-full">
            <span>Authors</span>
            <p class="field-hint muted">Add one or more attorneys. The first author is the primary byline on listings.</p>
            <div class="author-picker">
              <div class="author-picker-controls">
                <select id="author-add-select">
                  <option value="">Select an attorney…</option>
                </select>
                <button type="button" class="btn btn-ghost btn-sm" id="add-author-btn">Add author</button>
              </div>
              <ul id="author-list" class="author-chip-list" aria-live="polite"></ul>
            </div>
          </div>

          <label class="field field-full">
            <span>Summary</span>
            <textarea id="summary" rows="3" placeholder="Brief description for listings"></textarea>
            <p class="field-hint muted" id="summary-hint"></p>
          </label>

          <label class="field field-full">
            <span>Content</span>
            <textarea id="content" rows="14" required placeholder="Full entry body (supports HTML)"></textarea>
            <p class="field-hint muted" id="content-hint"></p>
          </label>

          <div class="form-actions field-full">
            <button type="submit" class="btn btn-primary">Save</button>
            <a class="btn btn-ghost" href="/admin/articles">Cancel</a>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script type="module" src="/js/pages/articles/form.js"></script>
</body>
</html>
